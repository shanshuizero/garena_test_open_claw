<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'English Study Web' }}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #e8ecf3;
    }
    a { color: #8cc8ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 24px; }
    .nav {
      display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px;
      padding: 16px; background: #121a30; border-radius: 14px;
    }
    .card {
      background: #121a30; border-radius: 16px; padding: 20px; margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; }
    .muted { color: #9aacbf; }
    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      background: #243556; color: #cfe4ff; font-size: 12px;
    }
    .content { line-height: 1.75; }
    code { background: #1c2742; padding: 2px 6px; border-radius: 8px; }
    h1,h2,h3 { margin-top: 0; }
    ul { padding-left: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="/">首页</a>
      <a href="/docs">全部资料</a>
      <a href="/days">30天计划</a>
      <a href="/daily/today">今日推送页</a>
      <a href="/pushes">推送记录</a>
      <a href="/api/docs">API</a>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
